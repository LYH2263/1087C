services:
  db:
    image: postgres:15-alpine
    container_name: bookshop-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bookshop
      POSTGRES_USER: bookuser
      POSTGRES_PASSWORD: bookpass
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookuser -d bookshop"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: bookshop-backend
    restart: unless-stopped
    command: >
      sh -c "if [ ! -d node_modules/.pnpm ]; then pnpm install --frozen-lockfile; fi
      && pnpm prisma generate
      && node scripts/waitForDb.js
      && pnpm prisma db push --accept-data-loss
      && pnpm prisma db seed
      && pnpm dev"
    environment:
      NODE_ENV: development
      PORT: 8000
      DATABASE_URL: postgresql://bookuser:bookpass@db:5432/bookshop?schema=public
      JWT_SECRET: super-secret-access
      JWT_REFRESH_SECRET: super-secret-refresh
      ACCESS_TOKEN_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_DAYS: 30
      LOG_LEVEL: info
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: bookshop-frontend
    restart: unless-stopped
    command: >
      sh -c "if [ ! -d node_modules/.pnpm ]; then pnpm install --frozen-lockfile; fi
      && pnpm dev --host 0.0.0.0 --port 3000"
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  db_data:
  uploads_data:
  backend_node_modules:
  frontend_node_modules:
